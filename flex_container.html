<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Flexbox Demo</title>

    <!-- Bootstrap CSS CDN -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>
        /* Flex container default styling */
        #flexContainer {
            border: 3px solid #444;
            height: 250px;
            padding: 10px;
            transition: all 0.3s ease;
        }

        /* Flex items */
        .flex-item {
            width: 80px;
            height: 60px;
            color: white;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 7px;
        }
    </style>
</head>
<body class="p-4">

    <h2 class="mb-4 text-center">⚡ Advanced Flexbox Property Demo</h2>

    <!-- Control Panel -->
    <div class="card p-3 mb-4 shadow-sm">
        <h5 class="mb-3">🎛 Flexbox Controls</h5>

        <div class="row g-3">

            <!-- Display -->
            <div class="col-md-4">
                <label class="form-label">display</label>
                <select id="display" class="form-select">
                    <option value="flex" selected>flex</option>
                    <option value="inline-flex">inline-flex</option>
                </select>
            </div>

            <!-- flex direction -->
            <div class="col-md-4">
                <label class="form-label">flex-direction</label>
                <select id="direction" class="form-select">
                    <option value="row" selected>row</option>
                    <option value="row-reverse">row-reverse</option>
                    <option value="column">column</option>
                    <option value="column-reverse">column-reverse</option>
                </select>
            </div>

            <!-- wrap -->
            <div class="col-md-4">
                <label class="form-label">flex-wrap</label>
                <select id="wrap" class="form-select">
                    <option value="nowrap" selected>nowrap</option>
                    <option value="wrap">wrap</option>
                    <option value="wrap-reverse">wrap-reverse</option>
                </select>
            </div>

            <!-- justify-content -->
            <div class="col-md-4">
                <label class="form-label">justify-content</label>
                <select id="justify" class="form-select">
                    <option value="flex-start">flex-start</option>
                    <option value="center">center</option>
                    <option value="flex-end">flex-end</option>
                    <option value="space-between">space-between</option>
                    <option value="space-around">space-around</option>
                    <option value="space-evenly">space-evenly</option>
                </select>
            </div>

            <!-- align-items -->
            <div class="col-md-4">
                <label class="form-label">align-items</label>
                <select id="alignItems" class="form-select">
                    <option value="stretch">stretch</option>
                    <option value="flex-start">flex-start</option>
                    <option value="center" selected>center</option>
                    <option value="flex-end">flex-end</option>
                </select>
            </div>

            <!-- align-content -->
            <div class="col-md-4">
                <label class="form-label">align-content</label>
                <select id="alignContent" class="form-select">
                    <option value="stretch" selected>stretch</option>
                    <option value="flex-start">flex-start</option>
                    <option value="center">center</option>
                    <option value="flex-end">flex-end</option>
                    <option value="space-between">space-between</option>
                    <option value="space-around">space-around</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Flex Container Preview -->
    <h4>🧩 Flex Container Preview</h4>
    <div id="flexContainer">
        <div class="flex-item bg-primary">1</div>
        <div class="flex-item bg-danger">2</div>
        <div class="flex-item bg-success">3</div>
        <div class="flex-item bg-warning text-dark">4</div>
        <div class="flex-item bg-info text-dark">5</div>
        <div class="flex-item bg-secondary">6</div>
    </div>

    <!-- JS to update properties -->
    <script>
        const container = document.getElementById("flexContainer");

        // List of all dropdowns
        const controls = {
            display: document.getElementById("display"),
            direction: document.getElementById("direction"),
            wrap: document.getElementById("wrap"),
            justify: document.getElementById("justify"),
            alignItems: document.getElementById("alignItems"),
            alignContent: document.getElementById("alignContent"),
        };

        // Apply values live
        Object.keys(controls).forEach(key => {
            controls[key].addEventListener("change", updateFlexbox);
        });

        function updateFlexbox() {
            container.style.display = controls.display.value;
            container.style.flexDirection = controls.direction.value;
            container.style.flexWrap = controls.wrap.value;
            container.style.justifyContent = controls.justify.value;
            container.style.alignItems = controls.alignItems.value;
            container.style.alignContent = controls.alignContent.value;
        }

        // Initial load
        updateFlexbox();
    </script>

</body>
</html>
