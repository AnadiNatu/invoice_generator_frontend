<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSS Position Demo Interactive</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Base container styling */
    .demo-box {
      height: 120px;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: all 0.4s ease;
    }

    /* Grid layout container */
    .grid-container {
      height: 500px;
      border: 3px dashed #999;
      padding: 20px;
      position: relative;
      overflow: auto;
    }

    /* Colors */
    .box-red { background: #dc3545; }
    .box-blue { background: #0d6efd; }
    .box-green { background: #198754; }
  </style>
</head>
<body class="p-4">

  <h2 class="text-center mb-4">🎯 CSS Position Demo (Interactive)</h2>

  <!-- Buttons to toggle position types -->
  <div class="text-center mb-4">
    <button class="btn btn-outline-primary m-1" onclick="setPosition('static')">Static</button>
    <button class="btn btn-outline-secondary m-1" onclick="setPosition('relative')">Relative</button>
    <button class="btn btn-outline-success m-1" onclick="setPosition('absolute')">Absolute</button>
    <button class="btn btn-outline-warning m-1" onclick="setPosition('fixed')">Fixed</button>
    <button class="btn btn-outline-danger m-1" onclick="setPosition('sticky')">Sticky</button>
  </div>

  <!-- Grid layout with boxes -->
  <div class="grid-container">

    <div id="box1" class="demo-box box-red mb-3">
      BOX 1
    </div>

    <div id="box2" class="demo-box box-blue mb-3">
      BOX 2
    </div>

    <div id="box3" class="demo-box box-green mb-3">
      BOX 3
    </div>

  </div>

  <script>
    const boxes = [document.getElementById("box1"), 
                   document.getElementById("box2"), 
                   document.getElementById("box3")];

    // Reset positions before applying new ones
    function resetBoxes() {
      boxes.forEach(box => {
        box.style.position = "static";
        box.style.top = "";
        box.style.left = "";
        box.style.right = "";
      });
    }

    // Set position type dynamically
    function setPosition(type) {
      resetBoxes();

      boxes.forEach((box, index) => {
        box.style.position = type;

        // Additional movement to demonstrate each type
        if (type === "relative") {
          if (index === 0) box.style.top = "20px";
          if (index === 1) box.style.left = "30px";
        }

        if (type === "absolute") {
          if (index === 0) box.style.top = "20px";
          if (index === 1) box.style.right = "20px";
          if (index === 2) box.style.bottom = "20px";
        }

        if (type === "fixed") {
          if (index === 0) box.style.top = "10px";
          if (index === 1) box.style.bottom = "10px";
          if (index === 2) box.style.right = "10px";
        }

        if (type === "sticky") {
          box.style.top = "10px";
        }
      });
    }
  </script>

</body>
</html>
